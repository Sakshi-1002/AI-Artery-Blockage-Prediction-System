<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Prediction Form
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">

            Artery Blockage Prediction Form

        </h2>

        <form action="/predict"
              method="post">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Age
                    </label>

                    <input type="number"
                           class="form-control"
                           name="age"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Sex
                    </label>

                    <select class="form-select"
                            name="sex">

                        <option value="1">
                            Male
                        </option>

                        <option value="0">
                            Female
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Chest Pain Type (cp)
                    </label>

                    <input type="number"
                           class="form-control"
                           name="cp"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Resting Blood Pressure
                    </label>

                    <input type="number"
                           class="form-control"
                           name="trestbps"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Cholesterol
                    </label>

                    <input type="number"
                           class="form-control"
                           name="chol"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Fasting Blood Sugar
                    </label>

                    <input type="number"
                           class="form-control"
                           name="fbs"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Rest ECG
                    </label>

                    <input type="number"
                           class="form-control"
                           name="restecg"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Maximum Heart Rate
                    </label>

                    <input type="number"
                           class="form-control"
                           name="thalach"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Exercise Induced Angina
                    </label>

                    <input type="number"
                           class="form-control"
                           name="exang"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Oldpeak
                    </label>

                    <input type="number"
                           step="0.1"
                           class="form-control"
                           name="oldpeak"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Slope
                    </label>

                    <input type="number"
                           class="form-control"
                           name="slope"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        CA
                    </label>

                    <input type="number"
                           class="form-control"
                           name="ca"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Thal
                    </label>

                    <input type="number"
                           class="form-control"
                           name="thal"
                           required>

                </div>

            </div>

            <div class="text-center mt-4">

                <button type="submit"
                        class="btn btn-success btn-lg">

                    Predict Risk

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
